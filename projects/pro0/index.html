<!DOCTYPE html>
<html>
<head>
    <title>LiveWhere</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>LiveWhere</h1>

    <!-- Input Section -->
    <div>
        <input type="text" id="name" placeholder="Enter your name">
        
        <select id="status">
            <option value="Home">Home</option>
            <option value="Office">Office</option>
            <option value="Out">Out of station</option>
        </select>

        <input type="text" id="place" placeholder="Enter place (if out)">
        
        <button onclick="addStatus()">Update Status</button>
    </div>

    <h2>Family Status</h2>

    <!-- Display Section -->
    <ul id="list"></ul>

    <script src="script.js"></script>
</body>
</html>
